<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICT1 Memories</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
      color: #eaeaea;
      overflow-x: hidden;
      position: relative;
    }

    .stars-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 30% 40%, #14141f, #030308 90%);
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(255, 200, 200, 0.5);
      animation: twinkle var(--duration) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }
    .shooting-star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 12px 4px rgba(255, 100, 100, 0.6);
      animation: shoot linear infinite;
      opacity: 0;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes shoot {
      0% { transform: translate(0, 0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(400px, 400px) scale(0.2); opacity: 0; }
    }

    .forge-card {
      max-width: 1200px;
      width: 100%;
      background: rgba(14, 12, 18, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 3.5rem;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 30px 80px rgba(255, 0, 0, 0.15), 0 0 0 1px rgba(180, 40, 40, 0.3);
      border: 1px solid rgba(200, 50, 50, 0.2);
      position: relative;
      z-index: 10;
      transition: box-shadow 0.3s ease;
    }
    .forge-card:hover {
      box-shadow: 0 40px 100px rgba(255, 0, 0, 0.25), 0 0 0 2px rgba(200, 60, 60, 0.4);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid rgba(180, 40, 40, 0.3);
      padding-bottom: 1.2rem;
      margin-bottom: 2rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .logo i {
      font-size: 2.6rem;
      color: #ff3a3a;
      filter: drop-shadow(0 0 12px #ff202088);
    }
    .logo h1 {
      font-weight: 800;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0eaea 0%, #ff6b6b 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .badge {
      background: rgba(30, 12, 12, 0.7);
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 50, 50, 0.25);
      font-size: 0.8rem;
      font-weight: 600;
      color: #ff9a9a;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
    }

    .login-panel {
      background: rgba(20, 12, 12, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(180, 40, 40, 0.3);
      border-radius: 2.5rem;
      padding: 1.8rem 2.2rem;
      margin-bottom: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 100, 100, 0.1);
      transition: border-color 0.3s;
    }
    .login-panel:hover { border-color: rgba(255, 70, 70, 0.5); }
    .login-field {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.3rem 1.2rem 0.3rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(180, 40, 40, 0.2);
      transition: all 0.3s;
    }
    .login-field:focus-within {
      border-color: #ff4a4a;
      box-shadow: 0 0 20px rgba(255, 50, 50, 0.1);
    }
    .login-field i {
      color: #ff6a6a;
      font-size: 1rem;
      opacity: 0.7;
    }
    .login-field input {
      background: transparent;
      border: none;
      padding: 0.7rem 0;
      color: #f0e0e0;
      font-size: 0.9rem;
      font-weight: 500;
      width: 140px;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .login-field input::placeholder {
      color: rgba(200, 150, 150, 0.4);
      font-weight: 400;
    }
    .login-btn {
      background: linear-gradient(135deg, #b02020, #cc2222);
      border: none;
      color: white;
      padding: 0.7rem 2rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 0 #5a0a0a, 0 4px 20px rgba(255, 0, 0, 0.2);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #5a0a0a, 0 8px 30px rgba(255, 0, 0, 0.3);
      background: linear-gradient(135deg, #cc2828, #dd3333);
    }
    .login-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #5a0a0a;
    }
    .login-status {
      font-size: 0.8rem;
      color: #ff8888;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.4rem 1rem;
      border-radius: 40px;
      border: 1px solid rgba(180, 40, 40, 0.15);
    }
    .login-status.success {
      color: #6fcf97;
      border-color: rgba(100, 200, 100, 0.3);
    }

    .gallery-wrapper {
      display: none;
      animation: fadeIn 0.8s ease;
    }
    .gallery-wrapper.active { display: block; }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .showcase-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin: 2rem 0 2.5rem;
    }
    @media (max-width: 760px) {
      .forge-card { padding: 1.8rem; }
      .showcase-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .login-panel { flex-direction: column; align-items: stretch; }
      .login-field input { width: 100%; }
    }
    .memory-card {
      background: rgba(20, 12, 12, 0.5);
      border-radius: 2.2rem;
      overflow: hidden;
      border: 2px dashed rgba(180, 40, 40, 0.2);
      transition: all 0.3s ease;
      box-shadow: 0 8px 0 #0a0000;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
    }
    .memory-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: #ff4a4a;
      box-shadow: 0 20px 40px -8px rgba(255, 0, 0, 0.2);
      border-style: solid;
    }
    .memory-card.has-image {
      border-style: solid;
      border-color: rgba(200, 60, 60, 0.4);
    }
    .photo-area {
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .photo-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      border-radius: 2.2rem 2.2rem 0 0;
    }
    .photo-area .placeholder-icon {
      font-size: 3.5rem;
      color: rgba(255, 80, 80, 0.3);
      margin-bottom: 0.8rem;
      transition: all 0.3s;
      z-index: 2;
    }
    .photo-area .placeholder-text {
      font-weight: 600;
      color: rgba(200, 150, 150, 0.5);
      font-size: 0.95rem;
      letter-spacing: 1px;
      z-index: 2;
    }
    .photo-area .upload-hint {
      font-size: 0.7rem;
      color: rgba(200, 150, 150, 0.3);
      margin-top: 0.4rem;
      font-weight: 400;
      z-index: 2;
    }
    .photo-area .image-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: 1;
      transition: background 0.3s;
    }
    .photo-area:hover .image-overlay {
      background: rgba(0, 0, 0, 0.05);
    }
    .memory-footer {
      padding: 0.9rem 1.2rem;
      background: rgba(10, 6, 6, 0.5);
      border-top: 1px solid rgba(180, 40, 40, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      backdrop-filter: blur(4px);
    }
    .memory-footer .memory-label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #e0d0d0;
    }
    .memory-footer .memory-label i {
      color: #ff4d4d;
      margin-right: 8px;
    }
    .memory-footer .memory-tag {
      background: rgba(20, 6, 6, 0.5);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      color: #ffa0a0;
      border: 1px solid rgba(180, 40, 40, 0.15);
    }

    .message-area {
      padding: 0.9rem 1.2rem;
      background: rgba(10, 6, 6, 0.3);
      border-top: 1px solid rgba(180, 40, 40, 0.1);
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .message-area input {
      flex: 1;
      min-width: 120px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(180, 40, 40, 0.2);
      border-radius: 40px;
      padding: 0.5rem 1.2rem;
      color: #e0d0d0;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.3s;
      font-family: 'Inter', sans-serif;
    }
    .message-area input:focus { border-color: #ff4a4a; }
    .message-area input::placeholder { color: rgba(200, 150, 150, 0.3); }
    .message-btn {
      background: rgba(180, 40, 40, 0.3);
      border: 1px solid rgba(180, 40, 40, 0.3);
      color: #ffb0b0;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }
    .message-btn:hover {
      background: rgba(200, 50, 50, 0.4);
      border-color: #ff4a4a;
    }
    .message-display {
      font-size: 0.8rem;
      color: #ff9999;
      font-style: italic;
      padding: 0.3rem 0.8rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      min-height: 2rem;
      width: 100%;
      text-align: center;
      margin-top: 0.2rem;
      border-left: 2px solid rgba(180, 40, 40, 0.2);
    }

    .footer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(180, 40, 40, 0.2);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .btn {
      background: rgba(30, 12, 12, 0.6);
      border: 1px solid rgba(150, 40, 40, 0.4);
      color: #ffc0c0;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
      cursor: pointer;
      box-shadow: 0 6px 0 #0a0000;
      backdrop-filter: blur(4px);
    }
    .btn i { color: #ff4a4a; }
    .btn:hover {
      background: rgba(50, 20, 20, 0.8);
      border-color: #ff5a5a;
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 10px 0 #1f0505;
      color: white;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: rgba(20, 12, 12, 0.95);
      border: 1px solid rgba(200, 50, 50, 0.3);
      border-radius: 2.5rem;
      padding: 2.5rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(255, 0, 0, 0.2);
      animation: fadeIn 0.3s ease;
      position: relative;
    }
    .modal-content h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #ffb0b0;
      text-align: center;
    }
    .modal-content label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #cc9999;
      margin-bottom: 0.5rem;
    }
    .modal-content input[type="file"] {
      width: 100%;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px dashed rgba(180, 40, 40, 0.3);
      border-radius: 1.5rem;
      color: #e0d0d0;
      margin-bottom: 1.2rem;
      cursor: pointer;
    }
    .modal-content input[type="file"]::file-selector-button {
      background: rgba(180, 40, 40, 0.3);
      border: 1px solid rgba(180, 40, 40, 0.3);
      color: #ffb0b0;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }
    .modal-content input[type="file"]::file-selector-button:hover {
      background: rgba(200, 50, 50, 0.4);
    }
    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
    .modal-actions .btn { padding: 0.6rem 1.8rem; font-size: 0.85rem; }
    .modal-actions .btn-primary {
      background: #b02020;
      border-color: #ff4444;
      color: #fff;
      box-shadow: 0 4px 0 #5a0a0a;
    }
    .modal-actions .btn-primary:hover { background: #d03030; }
    .modal-actions .btn-secondary { background: rgba(30, 12, 12, 0.6); }
    .close-modal {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 2rem;
      color: #ff6666;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .music-widget {
      background: rgba(20, 12, 12, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(180, 40, 40, 0.3);
      border-radius: 2.5rem;
      padding: 1.5rem 2rem;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: border-color 0.3s;
    }
    .music-widget:hover { border-color: rgba(255, 70, 70, 0.5); }
    .music-widget .cover-art {
      width: 80px;
      height: 80px;
      border-radius: 1.2rem;
      background: linear-gradient(135deg, #2a1212, #4a1a1a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #ff4d4d;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.2);
    }
    .music-widget .track-info {
      flex: 1;
      min-width: 150px;
    }
    .music-widget .track-info .title {
      font-weight: 700;
      font-size: 1.1rem;
      color: #f0e0e0;
      margin-bottom: 0.2rem;
    }
    .music-widget .track-info .artist {
      font-size: 0.85rem;
      color: #cc9999;
    }
    .music-widget .spotify-btn {
      background: #1DB954;
      border: none;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
      white-space: nowrap;
    }
    .music-widget .spotify-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 25px rgba(29, 185, 84, 0.4);
    }
    .music-widget .spotify-btn i { color: white; margin-right: 4px; }
    .music-widget .spotify-embed {
      width: 100%;
      margin-top: 0.8rem;
      border-radius: 1.2rem;
      overflow: hidden;
    }
    .music-widget .spotify-embed iframe {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 1.2rem;
    }
    @media (max-width: 600px) {
      .music-widget { flex-direction: column; align-items: stretch; text-align: center; padding: 1.5rem; }
      .music-widget .cover-art { margin: 0 auto; }
      .music-widget .spotify-btn { justify-content: center; }
    }

    @media (max-width: 480px) {
      .logo h1 { font-size: 1.6rem; }
      .forge-card { padding: 1.5rem; }
      .login-field input { width: 100px; }
      .message-area { flex-direction: column; }
      .message-area input { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="stars-layer" id="starsLayer"></div>

  <div class="forge-card">

    <div class="header">
      <div class="logo">
        <i class="fas fa-rocket"></i>
        <h1>ICT1 Memories</h1>
      </div>
      <div class="badge">
        <i class="fas fa-heart" style="color: #ff4d4d; margin-right: 6px;"></i>  2026-2027
      </div>
    </div>

    <div class="login-panel" id="loginPanel">
      <div class="login-field">
        <i class="fas fa-user"></i>
        <input type="text" id="usernameInput" placeholder="Username" value="PRESIDENT" />
      </div>
      <div class="login-field">
        <i class="fas fa-lock"></i>
        <input type="password" id="passwordInput" placeholder="Password" value="123" />
      </div>
      <button class="login-btn" id="loginBtn">
        <i class="fas fa-key"></i>  enter
      </button>
      <div class="login-status" id="loginStatus">awaiting</div>
    </div>

    <div class="gallery-wrapper" id="galleryWrapper">

      <div class="music-widget" id="musicWidget">
        <div class="cover-art">
          <i class="fas fa-music"></i>
        </div>
        <div class="track-info">
          <div class="title">Sama-Sama</div>
          <div class="artist">Ex Battalion</div>
        </div>
        <a class="spotify-btn" href="https://open.spotify.com/track/0yKorzbOVX0tTAqLklWW9o?si=JkZorTRwQ0atunDOPNJ5QQ" target="_blank">
          <i class="fab fa-spotify"></i>  Play on Spotify
        </a>
        <div class="spotify-embed">
          <iframe id="spotifyIframe" src="https://open.spotify.com/embed/track/0yKorzbOVX0tTAqLklWW9o?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </div>

      <div class="showcase-grid" id="memoryGrid"></div>

      <div class="footer-actions">
        <div class="badge" style="background: rgba(16,10,10,0.6); border-color: rgba(180,40,40,0.2);">
          <i class="fas fa-heart" style="color: #ff4d4d; margin-right: 6px;"></i>  share your memories
        </div>
        <div>
          <span class="btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>  logout</span>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="uploadModal">
    <div class="modal-content">
      <button class="close-modal" id="closeModalBtn">&times;</button>
      <h2><i class="fas fa-upload" style="color: #ff4d4d; margin-right: 10px;"></i>Upload Memory</h2>
      <label for="photoInput">Choose a photo</label>
      <input type="file" id="photoInput" accept="image/*" />
      <label for="descInput">Description / message</label>
      <input type="text" id="descInput" placeholder="write something..." style="width:100%; padding:0.8rem 1.2rem; background:rgba(0,0,0,0.4); border:1px solid rgba(180,40,40,0.2); border-radius:40px; color:#e0d0d0; font-size:0.9rem; outline:none; font-family:'Inter', sans-serif; margin-top:0.3rem;" />
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
        <button class="btn btn-primary" id="saveModalBtn"><i class="fas fa-check"></i>  Save</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const starsLayer = document.getElementById('starsLayer');
      for (let i = 0; i < 160; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3.5 + 1.5;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.animationDelay = (Math.random() * 5) + 's';
        star.style.opacity = Math.random() * 0.6 + 0.2;
        starsLayer.appendChild(star);
      }

      function createShootingStar() {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        star.style.left = Math.random() * 70 + '%';
        star.style.top = Math.random() * 40 + '%';
        star.style.animationDuration = (Math.random() * 2 + 1.8) + 's';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 3000);
      }
      setInterval(createShootingStar, 4000);
      setTimeout(createShootingStar, 600);

      let memories = [];
      let currentEditIndex = null;
      let isLoggedIn = false;

      function loadMemories() {
        const saved = localStorage.getItem('ict1_memories');
        if (saved) {
          try { memories = JSON.parse(saved); } catch(e) { memories = []; }
        }
        if (!memories || memories.length === 0) {
          memories = [
            { id: 0, image: null, description: '', caption: 'class of 2026' },
            { id: 1, image: null, description: '', caption: 'team work' },
            { id: 2, image: null, description: '', caption: 'innovation' },
            { id: 3, image: null, description: '', caption: 'dreams' }
          ];
          saveMemories();
        }
      }

      function saveMemories() {
        localStorage.setItem('ict1_memories', JSON.stringify(memories));
      }

      function renderGallery() {
        const grid = document.getElementById('memoryGrid');
        grid.innerHTML = '';
        memories.forEach((mem, index) => {
          const card = document.createElement('div');
          card.className = 'memory-card' + (mem.image ? ' has-image' : '');
          card.dataset.index = index;

          const photoArea = document.createElement('div');
          photoArea.className = 'photo-area';
          photoArea.dataset.index = index;

          if (mem.image) {
            const img = document.createElement('img');
            img.src = mem.image;
            img.alt = 'Memory ' + (index+1);
            photoArea.appendChild(img);
            const overlay = document.createElement('div');
            overlay.className = 'image-overlay';
            photoArea.appendChild(overlay);
          } else {
            const icon = document.createElement('div');
            icon.className = 'placeholder-icon';
            icon.innerHTML = '<i class="fas fa-image"></i>';
            photoArea.appendChild(icon);
            const text = document.createElement('div');
            text.className = 'placeholder-text';
            text.textContent = 'put your image here';
            photoArea.appendChild(text);
            const hint = document.createElement('div');
            hint.className = 'upload-hint';
            hint.textContent = 'click to add photo';
            photoArea.appendChild(hint);
          }

          photoArea.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!isLoggedIn) return;
            currentEditIndex = parseInt(this.dataset.index);
            openModal(currentEditIndex);
          });

          card.appendChild(photoArea);

          const footer = document.createElement('div');
          footer.className = 'memory-footer';
          const label = document.createElement('span');
          label.className = 'memory-label';
          label.innerHTML = `<i class="fas fa-heart"></i>  memory ${index+1}`;
          footer.appendChild(label);
          const tag = document.createElement('span');
          tag.className = 'memory-tag';
          tag.textContent = mem.caption || 'ready';
          footer.appendChild(tag);
          card.appendChild(footer);

          const msgArea = document.createElement('div');
          msgArea.className = 'message-area';

          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'message-input';
          input.placeholder = 'put your text here';
          input.value = mem.description || '';
          msgArea.appendChild(input);

          const saveBtn = document.createElement('button');
          saveBtn.className = 'message-btn save-msg';
          saveBtn.textContent = 'save';
          msgArea.appendChild(saveBtn);

          const display = document.createElement('div');
          display.className = 'message-display';
          display.textContent = mem.description || 'no message yet';
          msgArea.appendChild(display);

          saveBtn.addEventListener('click', function() {
            const msg = input.value.trim();
            if (msg) {
              memories[index].description = msg;
              display.textContent = msg;
              saveMemories();
              display.style.color = '#6fcf97';
              setTimeout(() => display.style.color = '#ff9999', 1500);
            } else {
              display.textContent = 'please write a message';
              setTimeout(() => {
                if (!input.value.trim()) display.textContent = memories[index].description || 'no message yet';
              }, 2000);
            }
          });

          input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') saveBtn.click();
          });

          card.appendChild(msgArea);
          grid.appendChild(card);
        });
      }

      const modal = document.getElementById('uploadModal');
      const photoInput = document.getElementById('photoInput');
      const descInput = document.getElementById('descInput');
      const saveModalBtn = document.getElementById('saveModalBtn');
      const cancelModalBtn = document.getElementById('cancelModalBtn');
      const closeModalBtn = document.getElementById('closeModalBtn');

      function openModal(index) {
        currentEditIndex = index;
        const mem = memories[index];
        descInput.value = mem.description || '';
        photoInput.value = '';
        modal.classList.add('active');
      }

      function closeModal() {
        modal.classList.remove('active');
        photoInput.value = '';
        currentEditIndex = null;
      }

      cancelModalBtn.addEventListener('click', closeModal);
      closeModalBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });

      saveModalBtn.addEventListener('click', function() {
        if (currentEditIndex === null) return;
        const file = photoInput.files[0];
        const desc = descInput.value.trim();

        if (!file) {
          if (desc) {
            memories[currentEditIndex].description = desc;
            saveMemories();
            renderGallery();
            closeModal();
            return;
          }
          closeModal();
          return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
          memories[currentEditIndex].image = e.target.result;
          if (desc) memories[currentEditIndex].description = desc;
          saveMemories();
          renderGallery();
          closeModal();
        };
        reader.readAsDataURL(file);
      });

      const usernameInput = document.getElementById('usernameInput');
      const passwordInput = document.getElementById('passwordInput');
      const loginBtn = document.getElementById('loginBtn');
      const loginStatus = document.getElementById('loginStatus');
      const galleryWrapper = document.getElementById('galleryWrapper');
      const logoutBtn = document.getElementById('logoutBtn');
      const spotifyIframe = document.getElementById('spotifyIframe');

      function handleLogin() {
        const user = usernameInput.value.trim();
        const pass = passwordInput.value.trim();
        if (user === 'PRESIDENT' && pass === '123') {
          loginStatus.textContent = 'ACCESS GRANTED';
          loginStatus.className = 'login-status success';
          loginStatus.style.color = '#6fcf97';
          isLoggedIn = true;
          galleryWrapper.classList.add('active');
          loadMemories();
          renderGallery();
          
          // Auto-play music - reload iframe with autoplay parameter
          setTimeout(function() {
            spotifyIframe.src = 'https://open.spotify.com/embed/track/0yKorzbOVX0tTAqLklWW9o?utm_source=generator&theme=0&autoplay=1';
          }, 500);
        } else {
          loginStatus.textContent = 'ACCESS DENIED';
          loginStatus.className = 'login-status';
          loginStatus.style.color = '#ff6b6b';
          const panel = document.getElementById('loginPanel');
          panel.style.transform = 'translateX(-10px)';
          setTimeout(() => panel.style.transform = 'translateX(10px)', 100);
          setTimeout(() => panel.style.transform = 'translateX(-6px)', 200);
          setTimeout(() => panel.style.transform = 'translateX(6px)', 300);
          setTimeout(() => panel.style.transform = 'translateX(0)', 400);
        }
      }

      loginBtn.addEventListener('click', handleLogin);
      usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
      passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });

      logoutBtn.addEventListener('click', function() {
        isLoggedIn = false;
        galleryWrapper.classList.remove('active');
        loginStatus.textContent = 'awaiting';
        loginStatus.className = 'login-status';
        loginStatus.style.color = '#ff8888';
        localStorage.removeItem('ict1_memories');
        memories = [];
        renderGallery();
        // Stop music by removing autoplay
        spotifyIframe.src = 'https://open.spotify.com/embed/track/0yKorzbOVX0tTAqLklWW9o?utm_source=generator&theme=0';
      });

      loadMemories();
      console.log('ICT1 Memories · 2026-2027');
      console.log('login: PRESIDENT / 123');
    })();
  </script>
</body>
</html>
